services:
  db:
    image: postgres:15
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ecommerce_db #nome do banco
      POSTGRES_USER: admin #usuario
      POSTGRES_PASSWORD: adminpassword #senha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: